version: 2

project_name: ccx

before:
  hooks:
    - go mod tidy

builds:
  - id: ccx
    main: ./cmd/ccx
    binary: ccx
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "ccx-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - CLAUDE.md
      - ccx.config.example.json
      - install.sh

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## Install

    **macOS / Linux**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/channel-spoonai/ccx/main/install.sh | bash
    ```

    **Windows (PowerShell)**
    ```powershell
    irm https://raw.githubusercontent.com/channel-spoonai/ccx/main/install.ps1 | iex
    ```

    수동 설치는 아래 Assets에서 OS/아키텍처에 맞는 아카이브를 받으세요.
